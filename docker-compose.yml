version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - EMAILREP_API_KEY=${EMAILREP_API_KEY:-}
    depends_on:
      - redis
    volumes:
      - ./uploads:/app/uploads

  worker:
    build: .
    command: celery -A tasks.celery_app:celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./uploads:/app/uploads

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
